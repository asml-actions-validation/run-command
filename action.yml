name: Run MATLAB Command
description: >-
  Run MATLAB scripts, functions, and statements
inputs:
  command:
    description: >-
      Script, function, or statement to execute
    required: true
  startup-options:
    description: >-
      Startup options for MATLAB
    required: false
    default: ""
  generate-summary:
    description: >-
      Option to generate a summary for the GitHub job summary
    required: false
    default: true
runs:
  using: node24
  main: dist/index.js
